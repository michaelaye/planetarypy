{% set version = "0.79.1" %}

package:
  name: planetarypy
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/planetarypy/planetarypy-{{ version }}.tar.gz
  sha256: 83aa7aeaf4547aef6d24ffa9cf42523c5ee7e29a1072aa839870a50630621fbd

build:
  entry_points:
    - plp = planetarypy.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - hatchling
    - pip
  run:
    - python >=3.11
    - astropy-base
    - typer >=0.9
    - numpy
    - pandas
    - pyarrow
    - pooch
    - pvl
    - lxml
    - python-dateutil
    - requests
    - tomlkit
    - tqdm
    - yarl
    - loguru
    - python-duckdb
    - rasterio
    - pyproj
    - rioxarray
    - matplotlib-base
    - rich
    - shapely
    - antimeridian
    - pdr
    - pillow
    # SPICE is a flagship feature and conda has no "extras" mechanism, so the
    # pip [spice] extra (spiceypy + scipy) ships in the conda package directly.
    - spiceypy
    - scipy

test:
  imports:
    - planetarypy
    - planetarypy.constants
    - planetarypy.pds
  commands:
    - pip check
    - plp --help
  requires:
    - pip
    - python

about:
  home: https://github.com/planetarypy/planetarypy
  summary: Python tools for planetary science data access — PDS indexes, SPICE kernels, instrument data, and per-body constants
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - michaelaye
