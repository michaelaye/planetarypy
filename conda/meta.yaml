{% set version = "0.69.0" %}

package:
  name: planetarypy
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/planetarypy/planetarypy-{{ version }}.tar.gz
  sha256: fd8041d17fecc0690307653a07f05c2d5a754e90dff20b404f38be801c71e354

build:
  entry_points:
    - plp = planetarypy.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - hatchling
    - pip
  run:
    - python >=3.11
    - astropy
    - typer >=0.9
    - numpy
    - pandas
    - pooch
    - pvl
    - lxml
    - python-dateutil
    - requests
    - tomlkit
    - tqdm
    - yarl
    - loguru
    - python-duckdb
    - rasterio
    - pyproj
    - rioxarray
    - matplotlib-base
    - rich
    - shapely

test:
  imports:
    - planetarypy
    - planetarypy.constants
    - planetarypy.pds
  commands:
    - pip check
    - plp --help
  requires:
    - pip
    - python

about:
  home: https://github.com/planetarypy/planetarypy
  summary: Python tools for planetary science data access — PDS indexes, SPICE kernels, instrument data, and per-body constants
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - michaelaye
