# Input kernels for `scripts/regenerate_constants.py`
# =====================================================
#
# Single source of truth for *which* SPICE kernels feed the per-IAU-edition
# constants modules. Edit this file when you want to:
#
#   - Add a newly-released NAIF kernel.
#   - Add coverage for a new mission target (Bennu, Ryugu, …).
#   - Bump a vintage (e.g. swap DE440 → DE441 once it lands).
#
# Every kernel entry carries a ``url`` so the regenerator can verify
# (or re-download) what it's reading. Files live under
# ``src/planetarypy/constants/_constants_sources/`` once downloaded.
#
# Versioning policy:
#
#   - **PCK** (cartographic + orientation) is **IAU-edition-versioned** —
#     each edition gets its own pck00NNN.tpc.
#   - **GM** (gravitational parameters) is **JPL-versioned** (DE-series
#     planetary ephemerides) — NOT IAU-versioned. We use the same
#     ``gm_de440.tpc`` for *all* IAU editions in v1. If anyone needs
#     era-correct GMs for strict pre-2014 reproducibility, switch the
#     ``[[common]]`` entry to ``gm_de421.tpc`` here and re-regenerate
#     that edition.
#   - **Mission-target kernels** (Bennu, Ryugu, Vesta, …) are
#     mission-versioned. Same kernel applies to all IAU editions.

# ── Kernels common to every IAU edition ─────────────────────────────────

[[common]]
file = "gm_de440.tpc"
url  = "https://naif.jpl.nasa.gov/pub/naif/generic_kernels/pck/gm_de440.tpc"
purpose = "Planetary barycenter GMs from JPL DE440 ephemeris (2020)"

# ── Mission-target small bodies (each kernel = shape + GM for one body) ─
#
# These complement the generic PCK, which only carries radii for the
# main planets + classical moons. Mission targets like Bennu / Ryugu /
# Itokawa aren't in the generic PCK at all; their cartographic + GM
# data lives in mission-specific kernels here.

[[common]]
file = "bennu_v17.tpc"
url  = "https://naif.jpl.nasa.gov/pub/naif/ORX/kernels/pck/bennu_v17.tpc"
purpose = "101955 Bennu — shape + GM (OSIRIS-REx mission, v17, 2021-02)"

[[common]]
file = "dawn_vesta_v04.tpc"
url  = "https://naif.jpl.nasa.gov/pub/naif/DAWN/kernels/pck/dawn_vesta_v04.tpc"
purpose = "4 Vesta — shape + GM (Dawn mission, v04)"

[[common]]
file = "dawn_ceres_v06.tpc"
url  = "https://naif.jpl.nasa.gov/pub/naif/DAWN/kernels/pck/dawn_ceres_v06.tpc"
purpose = "1 Ceres — shape + GM (Dawn mission, v06)"

[[common]]
file = "ROS_LUTETIA_RSOC_V03.TPC"
url  = "https://naif.jpl.nasa.gov/pub/naif/ROSETTA/kernels/pck/ROS_LUTETIA_RSOC_V03.TPC"
purpose = "21 Lutetia — shape + GM (Rosetta flyby, RSOC v03)"

[[common]]
file = "ROS_CGS_RSOC_V03.TPC"
url  = "https://naif.jpl.nasa.gov/pub/naif/ROSETTA/kernels/pck/ROS_CGS_RSOC_V03.TPC"
purpose = "67P/Churyumov-Gerasimenko — shape + GM (Rosetta mission)"

# TODO: Hayabusa-mission asteroid kernels (Itokawa, Ryugu) live on JAXA
# archives, not the NAIF mirrors. Add when canonical URLs are settled.
# Tracked via the upstream issue queue.

# ── Per-IAU-edition cartographic PCK ────────────────────────────────────

[edition.iau2009]
pck       = "pck00010.tpc"
url       = "https://naif.jpl.nasa.gov/pub/naif/generic_kernels/pck/pck00010.tpc"
reference = "IAU 2009 — Archinal et al., 'Report of the IAU Working Group on Cartographic Coordinates and Rotational Elements: 2009', Celest. Mech. Dyn. Astr. (2010)"

[edition.iau2015]
pck       = "pck00011.tpc"
url       = "https://naif.jpl.nasa.gov/pub/naif/generic_kernels/pck/pck00011.tpc"
reference = "IAU 2015 — Archinal et al., 'Report of the IAU Working Group on Cartographic Coordinates and Rotational Elements: 2015', Celest. Mech. Dyn. Astr. (2018)"
