name: Run software tests

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-variant: Miniforge3
        miniforge-version: latest
        activate-environment: test_env_py${{ matrix.python-version }}
        use-mamba: true
        python-version: ${{ matrix.python-version }}
        channels: conda-forge
        channel-priority: strict
        auto-activate-base: false
        conda-remove-defaults: true

    - name: Cache conda env
      uses: actions/cache@v4
      with:
        path: |
          ~/.conda/pkgs
          ~/.conda/envs
        key: conda-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          conda-${{ runner.os }}-py${{ matrix.python-version }}-

    - name: Install dependencies
      shell: bash -l {0}
      run: |
        mamba install -y -c conda-forge sh tomlkit
        python install_dev_deps.py

    - name: Install package
      shell: bash -l {0}
      run: pip install -e ".[dev]"

    - name: Prefetch SPICE generic kernels
      shell: bash -l {0}
      # Single-writer download so parallel pytest-xdist workers can't
      # race on the same .part file when test_spicer triggers
      # load_generic_kernels() concurrently.
      run: |
        python -c "from planetarypy.spice.generic_kernels import download_generic_kernels; download_generic_kernels()"

    - name: Run tests
      shell: bash -l {0}
      run: |
        pytest -m "not slow" --cov=src/planetarypy --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false
