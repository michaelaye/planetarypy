name: Run software tests

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-variant: Miniforge3
        miniforge-version: latest
        activate-environment: test_env_py${{ matrix.python-version }}
        use-mamba: true
        python-version: ${{ matrix.python-version }}
        channels: conda-forge
        channel-priority: strict
        auto-activate: false
        conda-remove-defaults: true

    - name: Cache conda env
      uses: actions/cache@v4
      with:
        path: |
          ~/.conda/pkgs
          ~/.conda/envs
        key: conda-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          conda-${{ runner.os }}-py${{ matrix.python-version }}-

    - name: Install dependencies
      shell: bash -l {0}
      run: |
        mamba install -y -c conda-forge sh tomlkit
        python install_dev_deps.py

    - name: Install package
      shell: bash -l {0}
      run: pip install -e ".[dev]"

    - name: Cache PDS indexes and SPICE kernels
      # ~/planetarypy_data/ holds SPICE generic kernels (~200 MB) and PDS
      # cumulative indexes (HiRISE RDR ~200 MB, CTX EDR ~100 MB). Caching
      # means we only hit the NAIF and PDS servers once per cache-key
      # change, rather than on every CI run.  Bump the key suffix
      # (currently ``testdata-v1``) to force a fresh pull.
      uses: actions/cache@v4
      with:
        path: ~/planetarypy_data
        key: planetarypy-testdata-v1-${{ runner.os }}
        restore-keys: |
          planetarypy-testdata-v1-

    - name: Prefetch SPICE generic kernels
      shell: bash -l {0}
      # Seeds the small generic kernel set (~20 MB: lsk + pck + de432s +
      # mar099s) for the in-gate Spicer tests. Idempotent after a cache hit.
      # Retries with exponential backoff so a transient NAIF timeout on a
      # cold cache doesn't false-red a release. (The HiRISE RDR prefetch was
      # removed — TestSolarAzimuth now uses embedded reference values instead
      # of the ~200 MB index.)
      run: |
        attempt=1; max=5; delay=15
        until python -c "from planetarypy.spice.generic_kernels import download_generic_kernels; download_generic_kernels()"; do
          if [ "$attempt" -ge "$max" ]; then
            echo "::error::NAIF prefetch failed after $max attempts."
            exit 1
          fi
          echo "::warning::NAIF prefetch attempt $attempt failed; retrying in ${delay}s..."
          sleep "$delay"
          attempt=$((attempt + 1)); delay=$((delay * 2))
        done

    - name: Run tests
      shell: bash -l {0}
      run: |
        pytest -m "not slow" --cov=src/planetarypy --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false

  minimal-install:
    # Validates the declared-dependency contract: `pip install planetarypy`
    # (no extras, no dev deps) should let users `import` every public
    # submodule and run `plp --help`. Without this job, dep-contract bugs
    # only manifest when external users hit them — see the v0.68.1
    # release-cycle post-mortem for the matplotlib-in-[spice] /
    # lxml-via-pandas.read_html cases this catches.
    name: Minimal install smoke test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install planetarypy (no extras, no dev)
      run: |
        python -m venv /tmp/minimal
        source /tmp/minimal/bin/activate
        pip install --upgrade pip
        pip install .

    - name: Import every public submodule
      run: |
        source /tmp/minimal/bin/activate
        python -c "
        import planetarypy
        from planetarypy.config import config
        from planetarypy.plotting import imshow_gray, add_sun_indicator, imshow_with_sun
        from planetarypy.pds import (
            get_index, missing_pids, pid_column, read_pids_file,
            print_available_indexes, complete_pid,
        )
        from planetarypy.catalog import (
            list_missions, list_instruments, list_products,
            search, fetch_product, fetch_products, get_product_urls,
            BatchFetchResult, OfflineError,
        )
        from planetarypy.constants import Mars, Earth, Moon
        from planetarypy import geo, utils, io, search, psa
        from planetarypy.instruments.mro import hirise
        from planetarypy.instruments.mro.ctx import ctx_edr, ctx_calib
        from planetarypy.instruments.go import ssi
        assert callable(planetarypy.open) and callable(planetarypy.read)
        assert callable(planetarypy.search_products) and callable(planetarypy.fetch_pds_product)
        print('All public imports OK')
        "

    - name: Run plp --help on every verb
      run: |
        source /tmp/minimal/bin/activate
        plp --help > /dev/null
        plp catalog --help > /dev/null
        plp indexes --help > /dev/null
        plp spice --help > /dev/null
        plp fetch --help > /dev/null
        plp open --help > /dev/null
        plp search --help > /dev/null
        plp psa --help > /dev/null
        plp indexes select --help > /dev/null

    - name: Exercise a runtime parquet round-trip (no-extras pip env)
      # The import + --help checks above validate the import-time dependency
      # contract, but a parquet engine (pyarrow) is a RUNTIME-only dep: it's
      # only needed when pandas actually reads/writes the PDS index cache, which
      # importing the package never triggers. This step fetches a tiny real
      # index and round-trips it through parquet, so a missing/undeclared engine
      # fails HERE (in the env that mirrors `pip install planetarypy`) rather
      # than only for end users. The test skips on genuine PDS downtime.
      run: |
        source /tmp/minimal/bin/activate
        pip install pytest
        pytest tests/test_pds_index_roundtrip.py -o addopts="" -v
