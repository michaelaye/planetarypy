name: Run software tests

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-variant: Miniforge3
        miniforge-version: latest
        activate-environment: test_env_py${{ matrix.python-version }}
        use-mamba: true
        python-version: ${{ matrix.python-version }}
        channels: conda-forge
        channel-priority: strict
        auto-activate: false
        conda-remove-defaults: true

    - name: Cache conda env
      uses: actions/cache@v4
      with:
        path: |
          ~/.conda/pkgs
          ~/.conda/envs
        key: conda-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          conda-${{ runner.os }}-py${{ matrix.python-version }}-

    - name: Install dependencies
      shell: bash -l {0}
      run: |
        mamba install -y -c conda-forge sh tomlkit
        python install_dev_deps.py

    - name: Install package
      shell: bash -l {0}
      run: pip install -e ".[dev]"

    - name: Cache PDS indexes and SPICE kernels
      # ~/planetarypy_data/ holds SPICE generic kernels (~200 MB) and PDS
      # cumulative indexes (HiRISE RDR ~200 MB, CTX EDR ~100 MB). Caching
      # means we only hit the NAIF and PDS servers once per cache-key
      # change, rather than on every CI run.  Bump the key suffix
      # (currently ``testdata-v1``) to force a fresh pull.
      uses: actions/cache@v4
      with:
        path: ~/planetarypy_data
        key: planetarypy-testdata-v1-${{ runner.os }}
        restore-keys: |
          planetarypy-testdata-v1-

    - name: Prefetch SPICE generic kernels
      shell: bash -l {0}
      # Idempotent after a cache hit: download_generic_kernels() skips
      # any file that already exists.  On a fresh cache this serially
      # seeds the kernels so parallel pytest-xdist workers don't race.
      run: |
        python -c "from planetarypy.spice.generic_kernels import download_generic_kernels; download_generic_kernels()"

    - name: Prefetch HiRISE RDR cumulative index
      shell: bash -l {0}
      # Same idempotency story as the SPICE prefetch: first run seeds
      # the parquet cache; subsequent runs hit the cache hit.  Covers
      # test_spicer.TestSolarAzimuth which queries the RDR index.
      run: |
        python -c "from planetarypy.pds import get_index; get_index('mro.hirise.rdr')"

    - name: Run tests
      shell: bash -l {0}
      run: |
        pytest -m "not slow" --cov=src/planetarypy --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false
